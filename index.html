<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cute Proposal</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background-color: #ffe6f0;
    overflow: hidden;
}

h1 { color: #ff4d88; }

img {
    width: 250px;
    height: 250px;
    border-radius: 20px;
    margin: 20px;
    object-fit: cover;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn { background: #4CAF50; color: white; }
#noBtn  { background: #ff4d4d; color: white; position: relative; }

.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to   { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<h1 id="question">Do you like me ,my bebe booo..? 💖</h1>

<img id="image" src="images/boo1.gif">

<br>

<button id="yesBtn">Yes 💚</button>
<button id="noBtn">No 💔</button>

<audio id="bgMusic" loop>
    <source src="Imaye-Imaye.mp3" type="audio/mpeg">
</audio>

<script>
let noCount = 0;
let musicStarted = false;

const images = [
    "images/boo1.gif",
    "images/boo2.gif",
    "images/boo3.gif",
    "images/boo4.gif",
    "images/boo5.gif"
];

const noTexts = [
    "Are you sure? 😢",
    "Really sure? 🥺",
    "Think again! 😭",
    "You're breaking my heart 💔",
    "Last chance 😭💖"
];

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const img = document.getElementById("image");
const question = document.getElementById("question");
const music = document.getElementById("bgMusic");

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 3000);
}

function createConfetti() {
    for (let i = 0; i < 80; i++) {
        const conf = document.createElement("div");
        conf.style.position = "absolute";
        conf.style.width = "8px";
        conf.style.height = "8px";
        conf.style.left = Math.random() * window.innerWidth + "px";
        conf.style.top = "-10px";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.animation = "fall 3s linear forwards";
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 3000);
    }
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes fall {
    to { transform: translateY(100vh); opacity: 0; }
}`;
document.head.appendChild(style);

/* NO click */
noBtn.addEventListener("click", () => {

    // 👉 START MUSIC HERE (your requirement)
    if (!musicStarted) {
        music.play().catch(()=>{});
        musicStarted = true;
    }

    noCount++;
    question.innerText = noTexts[noCount % noTexts.length];
    img.src = images[noCount % images.length];

    let size = parseInt(window.getComputedStyle(yesBtn).fontSize);
    yesBtn.style.fontSize = (size + 6) + "px";

    const x = Math.random()*200 - 100;
    const y = Math.random()*200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

/* YES click */
yesBtn.addEventListener("click", () => {
    question.innerText = "Yayyyy!!! I knew it, n that biggg booty is mine.. 💖🥰";
    img.src = "images/me.jpeg";
    noBtn.style.display = "none";

    setInterval(createHeart, 200);
    createConfetti();
});
</script>

</body>
</html>
